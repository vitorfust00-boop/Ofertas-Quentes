<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas Quente</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
    <div id="app">
        <!-- Landing View (GPS Setup) -->
        <div id="landing-view">
            <!-- Header -->
            <header class="header">
                <h1 class="logo">🔥 Ofertas <span class="highlight">Quente</span></h1>
                <p class="subtitle">As melhores promoções da sua região</p>
            </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Location Section -->
            <section class="location-section" id="location-section">
                <div class="glass-card text-center">
                    <h2>Encontre as ofertas perto de você</h2>
                    <p>Precisamos da sua localização para mostrar os mercados da região.</p>
                    <button id="btn-gps" class="btn-primary">
                        📍 Usar meu GPS
                    </button>
                    <p id="location-status" class="status-msg"></p>
                </div>
            </section>

            <!-- Loading AI Animation -->
            <section class="ai-loading hidden" id="ai-loading">
                <div class="spinner"></div>
                <p>Analisando mercados próximos...</p>
            </section>
        </div> <!-- End Landing View -->

        <!-- App View (Map & Results) -->
        <div id="app-view" class="hidden">
            <!-- Main Header for App View -->
            <header class="header" style="padding: 20px 0;">
                <h1 class="logo" style="font-size: 2rem;">🔥 Ofertas <span class="highlight">Quente</span></h1>
            </header>

            <!-- Results Section (Markets & Offers) -->
            <section class="results-section" id="results-section">
                <!-- Search & Camera Area -->
                <div class="search-container">
                    <input type="text" id="search-input" class="search-input" placeholder="Buscar por produto ou cód. barras...">
                    <button id="btn-search" class="btn-icon" title="Pesquisar">🔍</button>
                    <button id="btn-camera" class="btn-icon" title="Ler Código de Barras">📷</button>
                    <button id="btn-open-report" class="btn-primary" style="margin-top: 0; border-radius: 10px; padding: 10px 20px;">➕ Avisar Preço</button>
                </div>

                <!-- Camera Reader Container -->
                <div id="reader-container" class="hidden">
                    <div id="reader"></div>
                </div>
                <!-- Map Container -->
                <div class="map-container">
                    <div id="map"></div>
                </div>

                <h2 class="section-title">Mercados na Região</h2>
                <div class="market-list" id="market-list">
                    <!-- Markets will be injected here via JS -->
                </div>

                <h2 class="section-title mt-4">Promoções em Destaque</h2>
                <div class="offers-grid" id="offers-grid">
                    <!-- Offers will be injected here via JS -->
                </div>
            </section>
        </div> <!-- End App View -->
        </main>
    </div>
    
    <!-- Modal de Avisar Preço -->
    <div id="report-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <h2 style="margin-bottom: 20px; text-align: center;">Avisar Preço</h2>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-muted);">Produto</label>
                <input type="text" id="report-product" class="search-input" placeholder="Ex: Arroz 5kg, Cerveja..." style="width: 100%;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-muted);">Mercado</label>
                <select id="report-market" class="search-input" style="width: 100%;">
                    <option value="">Selecione um mercado próximo...</option>
                </select>
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-muted);">Preço (R$)</label>
                <input type="number" id="report-price" class="search-input" step="0.01" placeholder="Ex: 19.99" style="width: 100%;">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="btn-cancel-report" class="btn-icon" style="width: auto; padding: 0 20px; border-radius: 10px;">Cancelar</button>
                <button id="btn-submit-report" class="btn-primary" style="margin-top: 0; border-radius: 10px;">Enviar Preço</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- HTML5 QRCode -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script src="app.js"></script>
</body>
</html>
